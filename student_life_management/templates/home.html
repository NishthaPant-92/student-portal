<!DOCTYPE html>
<html>
<head>
<title>Smart Student Life Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
height:100vh;
margin:0;
display:flex;
justify-content:center;
align-items:center;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#667eea,#764ba2);
overflow:hidden;
}

/* floating circles */
.circle{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.1);
animation:float 10s infinite linear;
}

.circle1{
width:200px;
height:200px;
top:10%;
left:10%;
}

.circle2{
width:150px;
height:150px;
bottom:10%;
right:10%;
animation-duration:12s;
}

.circle3{
width:100px;
height:100px;
top:70%;
left:20%;
animation-duration:8s;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-30px)}
100%{transform:translateY(0)}
}

/* glass card */

.hero-card{
text-align:center;
padding:60px;
border-radius:20px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
box-shadow:0 20px 40px rgba(0,0,0,0.2);
color:white;
animation:fadeUp 1.5s ease;
}

.hero-card h1{
font-size:40px;
font-weight:bold;
margin-bottom:15px;
}

.hero-card p{
opacity:0.9;
margin-bottom:30px;
}

.btn-modern{
padding:12px 30px;
border-radius:30px;
border:none;
font-weight:600;
transition:0.3s;
}

.btn-login{
background:white;
color:#764ba2;
}

.btn-signup{
background:#ffcc70;
color:#333;
}

.btn-modern:hover{
transform:translateY(-3px);
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

@keyframes fadeUp{
from{opacity:0; transform:translateY(30px)}
to{opacity:1; transform:translateY(0)}
}

</style>
</head>

<body>

<div class="circle circle1"></div>
<div class="circle circle2"></div>
<div class="circle circle3"></div>

<div class="hero-card">

<h1>Smart Student Life</h1>

<p>
Manage your schedule, track stress levels, monitor expenses,  
and build a better student life — all in one platform.
</p>

<a href="{% url 'login' %}" class="btn btn-modern btn-login me-3">
Login
</a>

<a href="{% url 'signup' %}" class="btn btn-modern btn-signup">
Signup
</a>

</div>

</body>
</html>
